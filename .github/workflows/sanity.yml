name: Sanity

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: sanity-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  npm-test:
    name: npm test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run agent harness
        run: npm test

  godot-headless:
    name: Godot headless import and tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: .ci/godot
          key: godot-4.5.1-stable-linux-x86-64

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p .ci/godot
          curl -L -o /tmp/godot.zip https://github.com/godotengine/godot-builds/releases/download/4.5.1-stable/Godot_v4.5.1-stable_linux.x86_64.zip
          unzip /tmp/godot.zip -d .ci/godot
          mv .ci/godot/Godot_v4.5.1-stable_linux.x86_64 .ci/godot/godot
          chmod +x .ci/godot/godot

      - name: Verify Godot project imports
        run: .ci/godot/godot --headless --path godot --quit-after 1

      - name: Run GDScript behavioral tests
        run: |
          export PATH="$GITHUB_WORKSPACE/.ci/godot:$PATH"
          npm run godot:test

  steamdeck-export:
    name: Steam Deck debug export
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: .ci/godot
          key: godot-4.5.1-stable-linux-x86-64

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p .ci/godot
          curl -L -o /tmp/godot.zip https://github.com/godotengine/godot-builds/releases/download/4.5.1-stable/Godot_v4.5.1-stable_linux.x86_64.zip
          unzip /tmp/godot.zip -d .ci/godot
          mv .ci/godot/Godot_v4.5.1-stable_linux.x86_64 .ci/godot/godot
          chmod +x .ci/godot/godot

      - name: Cache Godot export templates
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates/4.5.1.stable
          key: godot-4.5.1-stable-export-templates

      - name: Install Godot export templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.5.1.stable
          curl -L -o /tmp/godot-templates.tpz https://github.com/godotengine/godot-builds/releases/download/4.5.1-stable/Godot_v4.5.1-stable_export_templates.tpz
          unzip /tmp/godot-templates.tpz -d /tmp/godot-templates
          cp /tmp/godot-templates/templates/* ~/.local/share/godot/export_templates/4.5.1.stable/

      - name: Export Steam Deck debug build
        run: |
          export PATH="$GITHUB_WORKSPACE/.ci/godot:$PATH"
          npm run export:steamdeck

      - name: Verify art is packed into the export
        run: |
          pck="dist/steamdeck/GardenNursery.pck"
          test -f "$pck" || { echo "Export PCK $pck is missing"; exit 1; }
          # Match the imported texture data entry (.godot/imported/<asset>.png-<hash>.ctex),
          # not the bare asset name — the name also appears as the scene's ext_resource
          # path and the .import sidecar, which ship even when the texture data does not
          # (the exact issue #92 gray-void failure this guard must catch).
          for asset in hush-arbor-yard player-pixel; do
            if ! grep -Eqa "imported/${asset}\.png-[0-9a-f]+\.ctex" "$pck"; then
              echo "Texture data for '$asset' is not packed into the export — the build would render a gray void (issue #92)"
              exit 1
            fi
          done
          echo "ok - yard and player texture data are packed into the exported build"

      - name: Upload Steam Deck debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: garden-nursery-steamdeck-debug
          path: dist/steamdeck/

  screenshots:
    name: Gameplay screenshots
    # Evidence, not a gate: a flaky virtual-framebuffer frame must never fail the
    # workflow or trip the auto-revert. It uploads what it captures; the harness reads
    # the artifact to judge layout (issue #98, Tier 2).
    continue-on-error: true
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: .ci/godot
          key: godot-4.5.1-stable-linux-x86-64

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p .ci/godot
          curl -L -o /tmp/godot.zip https://github.com/godotengine/godot-builds/releases/download/4.5.1-stable/Godot_v4.5.1-stable_linux.x86_64.zip
          unzip /tmp/godot.zip -d .ci/godot
          mv .ci/godot/Godot_v4.5.1-stable_linux.x86_64 .ci/godot/godot
          chmod +x .ci/godot/godot

      - name: Install xvfb and software GL
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1 libglu1-mesa

      - name: Capture gameplay screenshots
        env:
          # Force llvmpipe so opengl3 renders under the headless virtual framebuffer.
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: |
          export PATH="$GITHUB_WORKSPACE/.ci/godot:$PATH"
          npm run godot:screens

      - name: Upload gameplay screenshots
        uses: actions/upload-artifact@v4
        with:
          name: garden-nursery-screens
          path: dist/screens/

  recover:
    name: Recover failed managed change
    needs: [npm-test, godot-headless, steamdeck-export]
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.npm-test.result == 'failure' || needs.godot-headless.result == 'failure' || needs.steamdeck-export.result == 'failure') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Revert the harness-managed head or open an incident
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          git fetch origin main
          current_sha="$(git rev-parse origin/main)"
          message="$(git show -s --format=%B "$FAILED_SHA")"
          if [ "$current_sha" = "$FAILED_SHA" ] && grep -qx 'Harness-Managed: true' <<<"$message"; then
            git config user.name 'garden-nursery recovery bot'
            git config user.email 'actions@users.noreply.github.com'
            git checkout -B harness-recovery origin/main
            git revert --no-edit "$FAILED_SHA"
            git push origin HEAD:main
            exit 0
          fi

          title="Sanity checks need repair: ${FAILED_SHA:0:12}"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq 'length')"
          if [ "$existing" = "0" ]; then
            gh issue create \
              --title "$title" \
              --body "Automated checks failed for \`$FAILED_SHA\`. The commit was not automatically reverted because it was no longer the head of main or was not marked as harness-managed. Run: $RUN_URL"
          fi
          exit 1
