ssh_remote_deploy/run_script="#!/usr/bin/env bash\nchmod +x '{temp_dir}/{archive_name}/GardenNursery.x86_64'\n'{temp_dir}/{archive_name}/GardenNursery.x86_64'\n"
ssh_remote_deploy/cleanup_script="#!/usr/bin/env bash\nkill $(pgrep -f GardenNursery.x86_64)\n"
